<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল এক্সাম কোশ্চেন মেকার ও ওএমআর জেনারেটর</title>
    <link rel="stylesheet" href="style.css">
    <script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>
<body>

    <div class="sidebar no-print">
        <h2>📋 Controlling Panel</h2>
        
        <div class="form-group">
            <label for="mockTestSelect">মক টেস্ট সিলেক্ট করুন:</label>
            <select id="mockTestSelect" onchange="loadMockTestScript()">
                <option value="">-- একটি পরীক্ষা বাছুন --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="languageSelect">প্রশ্নপত্রের ভাষা:</label>
            <select id="languageSelect">
                <option value="bn" selected>বাংলা (Bengali)</option>
                <option value="en">English</option>
                <option value="hi">হিন্দি (Hindi)</option>
                <option value="or">ওড়িয়া (Oriya)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="coachingName">কোচিং সেন্টারের নাম:</label>
            <input type="text" id="coachingName" value="পাঠশালা কোচিং সেন্টার" placeholder="নাম লিখুন...">
        </div>

        <div class="form-group">
            <label for="testName">পরীক্ষা / সাবজেক্টের নাম:</label>
            <input type="text" id="testName" value="Kolkata Police Constable Mock Test - 01" placeholder="যেমন: KP Constable Mock-1">
        </div>

        <div class="intro-settings" style="margin-bottom: 15px;">
            <div class="form-group" style="margin-bottom: 10px;">
                <label for="totalMarks">মোট নম্বর (Full Marks):</label>
                <input type="text" id="totalMarks" value="85">
            </div>
            <div class="form-group" style="margin-bottom: 10px;">
                <label for="examTime">পরীক্ষার সময় (Duration):</label>
                <input type="text" id="examTime" value="১ ঘণ্টা">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label for="negMarks">নেগেটিভ মার্কিং (Negative):</label>
                <input type="text" id="negMarks" value="0.25">
            </div>
        </div>

        <div class="form-group row-group">
            <input type="checkbox" id="showIntro" checked>
            <label for="showIntro">ফ্রন্ট/ইন্ট্রোডাকশন পেজ যোগ করুন</label>
        </div>

        <div class="form-group row-group">
            <input type="checkbox" id="showAnswers">
            <label for="showAnswers" style="color: #2ecc71; font-weight: bold;">সঠিক উত্তর হাইলাইট করুন (Answer Key)</label>
        </div>

        <div class="form-group row-group" style="margin-bottom: 10px;">
            <input type="checkbox" id="showOMR" onchange="toggleOMROptions()">
            <label for="showOMR" style="color: #00d2d3; font-weight: bold;">ওএমআর (OMR) শিট যুক্ত করুন</label>
        </div>

        <div id="omrOptionsContainer" style="display: none; padding-left: 10px; border-left: 1px dashed #57606f; margin-bottom: 15px;">
            <div class="form-group row-group" style="margin-bottom: 8px;">
                <input type="radio" id="omrAtEnd" name="omrDownloadType" value="end" checked>
                <label for="omrAtEnd" style="font-size: 12.5px; color: #ced6e0; cursor: pointer;">Append at the end of Exam PDF</label>
            </div>
            <div class="form-group row-group" style="margin-bottom: 0;">
                <input type="radio" id="omrSeparate" name="omrDownloadType" value="separate">
                <label for="omrSeparate" style="font-size: 12.5px; color: #ced6e0; cursor: pointer;">Generate OMR Separately</label>
            </div>
        </div>

        <button class="generate-btn" onclick="generateView()">👁️ প্রিভিউ দেখুন</button>
        <button class="print-btn" onclick="window.print()">📥 PDF ডাউনলোড করুন</button>
    </div>

    <div class="main-content">
        <div class="print-container" id="printArea">
            <div style="text-align: center; color: #7f8c8d; margin-top: 100px;">
                <h3>⚠️ কোনো মক টেস্ট লোড করা নেই!</h3>
                <p>দয়া করে বামদিকের প্যানেল থেকে একটি পরীক্ষা সিলেক্ট করে "প্রিভিউ দেখুন" বাটনে ক্লিক করুন।</p>
            </div>
        </div>
    </div>

    <script src="question/file-list.js"></script>
    <script src="script.js"></script>
</body>
</html>
